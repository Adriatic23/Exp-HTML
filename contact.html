<!DOCTYPE html>
<html>
<head>
    <title>Contact - Growth Hackers</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- MAIN CSS -->
    <link rel="stylesheet" href="style.css">

    <!-- FONT AWESOME (icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

<header>
    <h2>🚀 Growth Hackers</h2>
    <nav>
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section class="contact-section">

    <div class="contact-box">
        <h2>Contact Us</h2>

        <!-- FORM -->
        <form class="contact-form" action="https://formspree.io/f/xwvykdlz" method="POST">

            <input type="text" name="name" placeholder="👤 Your Name" required>

            <input type="email" name="email" placeholder="📧 Your Email" required>

            <textarea name="message" placeholder="✉️ Your Message" rows="5" required></textarea>

            <!-- Email subject -->
            <input type="hidden" name="_subject" value="New Contact Message from Website">

            <!-- Redirect page -->
            <input type="hidden" name="_next" value="thankyou.html">

            <button type="submit">Send Message</button> 
        </form>

        <!-- MAP -->
        <h3>Our Location 📍</h3>
        <div class="map">
            <iframe src="https://maps.google.com/maps?q=nagpur&z=13&output=embed"></iframe>
        </div>

        <!-- SOCIAL MEDIA -->
        <div class="social">
            <h3>Connect With Us</h3>

            <a href="https://www.instagram.com/ayush_pethe23?igsh=eDlhaHJkYjdoaHU2" target="_blank" class="instagram">
                <i class="fab fa-instagram"></i>
            </a>

            <a href="https://x.com/pethe_ayush?t=jlak8tKvwueWoSpKdraSzg&s=09" target="_blank" class="twitter">
                <i class="fab fa-twitter"></i>
            </a>

            <a href="https://discord.gg/MsXSTFke" target="_blank" class="discord">
                <i class="fab fa-discord"></i>
            </a>
        </div>

    </div>

</section>

<footer>

</footer>

</body>
</html>
